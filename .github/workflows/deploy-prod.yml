name: Deploy to production

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-functions:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Clear WEBSITE_RUN_FROM_PACKAGE (conflicts with func publish)
        run: |
          az functionapp config appsettings delete \
            --name func-crisis-pipeline-f2cuduc3mkkuc \
            --resource-group rg-crisis-platform-dev \
            --setting-names WEBSITE_RUN_FROM_PACKAGE SCM_RUN_FROM_PACKAGE --output none || true
          az functionapp config appsettings delete \
            --name func-crisis-bot-f2cuduc3mkkuc \
            --resource-group rg-crisis-platform-dev \
            --setting-names WEBSITE_RUN_FROM_PACKAGE SCM_RUN_FROM_PACKAGE --output none || true

      - name: Deploy pipeline function app
        working-directory: functions
        run: func azure functionapp publish func-crisis-pipeline-f2cuduc3mkkuc --python

      - name: Deploy bot function app
        working-directory: bot
        run: func azure functionapp publish func-crisis-bot-f2cuduc3mkkuc --python

  deploy-pwa:
    name: Deploy PWA to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - run: npm ci
        working-directory: pwa

      - run: npm run build
        working-directory: pwa
        env:
          VITE_API_BASE_URL:    ${{ secrets.API_BASE_URL }}
          VITE_CRISIS_EVENT_ID: ${{ secrets.CRISIS_EVENT_ID }}
          VITE_INGEST_API_KEY:  ${{ secrets.INGEST_API_KEY }}

      - name: Deploy PWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN_PWA }}
          repo_token:                      ${{ secrets.GITHUB_TOKEN }}
          action:                          upload
          app_location:                    pwa/dist
          skip_app_build:                  true

  deploy-dashboard:
    name: Deploy Dashboard to Azure Static Web Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci
        working-directory: dashboard

      - run: npm run build
        working-directory: dashboard
        env:
          VITE_API_BASE_URL:             ${{ secrets.API_BASE_URL }}
          VITE_CRISIS_EVENT_ID:         ${{ secrets.CRISIS_EVENT_ID }}
          VITE_EXPORT_API_KEY:          ${{ secrets.EXPORT_API_KEY }}
          VITE_ADMIN_KEY_REQUIRED:      "true"
          VITE_PWA_URL:                 ${{ secrets.VITE_PWA_URL }}
          VITE_TELEGRAM_BOT_USERNAME:   ${{ secrets.VITE_TELEGRAM_BOT_USERNAME }}

      - name: Deploy Dashboard
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN_DASHBOARD }}
          repo_token:                      ${{ secrets.GITHUB_TOKEN }}
          action:                          upload
          app_location:                    dashboard/dist
          skip_app_build:                  true

  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-functions, deploy-pwa, deploy-dashboard]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for functions to warm up
        run: sleep 60

      - name: Run smoke tests
        run: python tests/e2e/smoke_test.py --env prod --crisis-id ${{ secrets.CRISIS_EVENT_ID }}
        env:
          API_BASE_URL:    ${{ secrets.API_BASE_URL }}
          EXPORT_API_KEY:  ${{ secrets.EXPORT_API_KEY }}
          INGEST_API_KEY:  ${{ secrets.INGEST_API_KEY }}
          ADMIN_API_KEY:   ${{ secrets.ADMIN_API_KEY }}
